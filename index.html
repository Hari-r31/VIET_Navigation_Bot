<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.jpg" />
    <title>VIET Campus Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Telugu:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Prevent selection for kiosk feel */
        user-select: none; 
        -webkit-user-select: none;
      }

      /* Telugu override */
      .telugu {
        font-family: 'Noto Sans Telugu', sans-serif;
        font-size: 1.08em;      /* slight bump */
        line-height: 1.7;       /* critical */
        letter-spacing: 0.01em;
      }
            /* Hide scrollbar for kiosk aesthetics */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
  <script type="importmap">
